<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>omnimap</title>
<script>
  // Apply-before-paint: detect theme before first render to prevent flash
  (function() {
    var saved = null;
    try { saved = localStorage.getItem('omm-theme'); } catch(e) {}
    var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: light)').matches === false;
    if (!dark) document.documentElement.classList.add('light');
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── CSS Variables: Dark theme (default) ─────────────── */
:root {
  /* Layout */
  --sidebar-w: 400px;
  --nav-w: 200px;
  --sb-font: clamp(12px, 1vw, 16px);
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Fira Code', monospace;

  /* Backgrounds */
  --bg: #000000;
  --bg-subtle: #0a0a0a;
  --surface: #0d0d0d;
  --surface2: #111111;
  --surface3: #141414;
  --surface4: #161616;

  /* Borders */
  --border: #333333;
  --border-subtle: #222222;
  --border-muted: #1a1a1a;
  --border-faint: #151515;
  --border-hi: #333333;

  /* Text */
  --text: #ffffff;
  --text-secondary: #eeeeee;
  --text-body: #cccccc;
  --text-mid: #aaaaaa;
  --text-dim: #888888;
  --text-muted: #666666;
  --text-faint: #555555;
  --text-ghost: #444444;

  /* Accent */
  --accent: #818cf8;
  --accent-soft: rgba(129,140,248,0.3);
  --accent-glow: rgba(129,140,248,0.6);
  --accent-fill: #4f46e5;

  /* Status */
  --success: #22c55e;
  --error: #ef4444;
  --warning: #fbbf24;
  --success-text: #22c55e;
  --error-text: #fca5a5;
  --warning-text: #fde68a;

  /* Code syntax */
  --syn-keyword: #c084fc;
  --syn-direction: #67e8f9;
  --syn-arrow: #fbbf24;
  --syn-node: #818cf8;
  --syn-label: #a3e635;
  --syn-class: #fb923c;
  --syn-comment: #555555;
  --syn-ref: #f472b6;

  /* Search & snippets */
  --search-match-bg: rgba(129,140,248,0.15);
  --search-match-text: #c7d2fe;
  --snippet-strong: #e2e8f0;
  --snippet-em: #a5b4fc;
  --snippet-code-bg: #1e1e2e;
  --snippet-code-text: #c4b5fd;
  --snippet-link: #93c5fd;

  /* Sidebar fields */
  --sec-title: #888888;
  --sec-border: #1e1e1e;
  --body-text: #bbbbbb;
  --code-bg: #111111;
  --code-text: #cccccc;
  --concern-border: #444444;
  --meta-text: #777777;

  /* Tags & refs */
  --tag-bg: #1a1a2e;
  --tag-border: #2d2d44;
  --tag-text: #818cf8;
  --ref-bg: #090909;
  --ref-border: #1e1e1e;
  --ref-text: #999999;
  --ref-hover-border: #333333;
  --ref-hover-text: #bbbbbb;

  /* Diff */
  --diff-border: #333333;
  --diff-text: #888888;
  --diff-active-border: #22c55e;
  --diff-active-text: #22c55e;

  /* SVG node classes */
  --node-external-bg: #313244;
  --node-external-border: #585b70;
  --node-external-text: #cdd6f4;
  --node-concern-bg: #45233a;
  --node-concern-border: #f38ba8;
  --node-concern-text: #f38ba8;
  --node-entry-bg: #1e3a5f;
  --node-entry-border: #89b4fa;
  --node-entry-text: #89b4fa;
  --node-store-bg: #1e3a2e;
  --node-store-border: #a6e3a1;
  --node-store-text: #a6e3a1;
  --node-default-bg: #18181b;
  --node-default-border: #3f3f46;
  --node-default-text: #e4e4e7;

  /* SVG structural */
  --svg-group-fill: #0a0a0a;
  --svg-group-stroke: #666666;
  --svg-sub-fill: #111111;
  --svg-sub-stroke: #666666;
  --svg-sub-label-fill: #ffffff;
  --svg-edge-0: #909090;
  --svg-edge-1: #787878;
  --svg-edge-label-bg: #000000;
  --svg-edge-label-text: #aaaaaa;
  --svg-grp-label-fill: #ffffff;
  --svg-grp-label-center-fill: #dddddd;
  --svg-label-fill: #cbd5e1;
  --svg-label-fill-dim: #cccccc;

  /* Dot grid */
  --grid-dot: #1a1a1a;

  /* Floating controls */
  --controls-bg: rgba(0,0,0,0.7);

  /* Misc */
  --empty-text: #444444;
  --mobile-btn-bg: rgba(0,0,0,0.75);
  --mobile-overlay-bg: rgba(0,0,0,0.5);
  --sb-head-handle: #444444;
}

/* ── Light theme ─────────────────────────────────────── */
html.light {
  --bg: #f0f0f0;
  --bg-subtle: #e8e8e8;
  --surface: #ffffff;
  --surface2: #f5f5f5;
  --surface3: #f5f5f5;
  --surface4: #eeeeee;

  --border: #dddddd;
  --border-subtle: #dddddd;
  --border-muted: #eeeeee;
  --border-faint: #eeeeee;
  --border-hi: #bbbbbb;

  --text: #1a1a1a;
  --text-secondary: #1e293b;
  --text-body: #333333;
  --text-mid: #555555;
  --text-dim: #888888;
  --text-muted: #999999;
  --text-faint: #aaaaaa;
  --text-ghost: #bbbbbb;

  --accent: #4f46e5;
  --accent-soft: rgba(79,70,229,0.2);
  --accent-glow: rgba(79,70,229,0.4);
  --accent-fill: #4f46e5;

  --success: #16a34a;
  --error: #dc2626;
  --warning: #d97706;
  --success-text: #16a34a;
  --error-text: #b91c1c;
  --warning-text: #92400e;

  --syn-keyword: #7c3aed;
  --syn-direction: #0891b2;
  --syn-arrow: #d97706;
  --syn-node: #4f46e5;
  --syn-label: #65a30d;
  --syn-class: #ea580c;
  --syn-comment: #aaaaaa;
  --syn-ref: #db2777;

  --search-match-bg: rgba(79,70,229,0.1);
  --search-match-text: #4338ca;
  --snippet-strong: #1e293b;
  --snippet-em: #6366f1;
  --snippet-code-bg: #e0e7ff;
  --snippet-code-text: #4338ca;
  --snippet-link: #2563eb;

  --sec-title: #aaaaaa;
  --sec-border: #dddddd;
  --body-text: #555555;
  --code-bg: #e5e5e5;
  --code-text: #333333;
  --concern-border: #cccccc;
  --meta-text: #999999;

  --tag-bg: #eef2ff;
  --tag-border: #c7d2fe;
  --tag-text: #4338ca;
  --ref-bg: #eeeeee;
  --ref-border: #dddddd;
  --ref-text: #555555;
  --ref-hover-border: #aaaaaa;
  --ref-hover-text: #111111;

  --diff-border: #dddddd;
  --diff-text: #888888;
  --diff-active-border: #16a34a;
  --diff-active-text: #16a34a;

  --node-external-bg: #e8e8ec;
  --node-external-border: #999999;
  --node-external-text: #333333;
  --node-concern-bg: #fce4ec;
  --node-concern-border: #e57373;
  --node-concern-text: #b71c1c;
  --node-entry-bg: #e3f2fd;
  --node-entry-border: #64b5f6;
  --node-entry-text: #0d47a1;
  --node-store-bg: #e8f5e9;
  --node-store-border: #81c784;
  --node-store-text: #1b5e20;
  --node-default-bg: #ffffff;
  --node-default-border: #bbbbbb;
  --node-default-text: #333333;

  --svg-group-fill: #f8f8f8;
  --svg-group-stroke: #bbbbbb;
  --svg-sub-fill: #efefef;
  --svg-sub-stroke: #bbbbbb;
  --svg-sub-label-fill: #888888;
  --svg-edge-0: #94a3b8;
  --svg-edge-1: #bbbbbb;
  --svg-edge-label-bg: #e8e8e8;
  --svg-edge-label-text: #475569;
  --svg-grp-label-fill: #475569;
  --svg-grp-label-center-fill: #222222;
  --svg-label-fill: #475569;
  --svg-label-fill-dim: #333333;

  --grid-dot: #cccccc;
  --controls-bg: rgba(255,255,255,0.8);
  --empty-text: #bbbbbb;
  --mobile-btn-bg: rgba(255,255,255,0.85);
  --mobile-overlay-bg: rgba(0,0,0,0.3);
  --sb-head-handle: #bbbbbb;
}

html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* Nav sidebar */
#nav-sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--nav-w); min-width: 140px; max-width: 420px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 200;
  transition: width .18s ease, border-color .18s;
}
/* Drag resize handle */
#nav-resize {
  position: absolute; top: 0; right: -3px; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 210;
  background: transparent;
  transition: background .15s;
}
#nav-resize:hover, #nav-resize.dragging { background: var(--accent-soft); }

#nav-title-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 10px 10px 14px;
  flex-shrink: 0;
}
#nav-title {
  flex: 1; font-size: 13px; font-weight: 600; color: var(--text);
  font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* Language Stats */
.lang-stats {
  padding: 0 14px 10px;
  flex-shrink: 0;
}
.lang-stats-bar {
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
  display: flex;
  margin-bottom: 6px;
  background: var(--surface2);
}
.lang-stats-segment {
  height: 100%;
  min-width: 2px;
  transition: width 0.3s ease;
}
.lang-stats-labels {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  font-size: 10px;
  color: var(--text-muted);
}
.lang-stats-label {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: default;
}
.lang-stats-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.lang-stats-pct {
  color: var(--text);
  font-weight: 500;
}
/* Search */
#search-box {
  position: relative;
  padding: 0 10px 10px;
  flex-shrink: 0;
}
#search-input {
  width: 100%; height: calc(var(--sb-font) + 16px);
  background: var(--surface2); border: 1px solid var(--border-subtle); border-radius: 5px;
  color: var(--text-body); font-size: var(--sb-font); font-family: var(--font);
  padding: 0 8px 0 28px;
  outline: none; transition: border-color .15s;
}
#search-input:focus { border-color: var(--text-faint); }
#search-input::placeholder { color: var(--text-ghost); }
#search-icon {
  position: absolute; left: 18px; top: 8px;
  color: var(--text-ghost); font-size: 13px; pointer-events: none;
}
/* Results dropdown */
#search-results {
  position: fixed; top: 52px; left: var(--nav-w);
  width: 420px; max-height: 400px;
  background: var(--bg-subtle); border: 1px solid var(--border-subtle); border-radius: 8px;
  overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--surface4) transparent;
  display: none; z-index: 350;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
}
#search-results.open { display: block; }
.sr-item {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border-faint);
  transition: background .1s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover, .sr-item.active { background: var(--surface4); }
.sr-item-header { display: flex; align-items: center; gap: 8px; }
.sr-path {
  font-size: 12px; font-family: var(--mono); color: var(--text-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.sr-field {
  display: inline-block; font-size: 9px; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text-muted); background: var(--surface3);
  padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
}
.sr-snippet {
  font-size: 12px; color: var(--text-dim); line-height: 1.6;
  word-break: break-word;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.sr-snippet mark {
  background: var(--search-match-bg); color: var(--search-match-text);
  border-radius: 2px; padding: 0 2px; font-weight: 600;
}
.sr-snippet strong { color: var(--snippet-strong); font-weight: 600; }
.sr-snippet em { color: var(--snippet-em); font-style: italic; }
.sr-snippet code { background: var(--snippet-code-bg); color: var(--snippet-code-text); padding: 1px 4px; border-radius: 3px; font-size: 0.9em; font-family: var(--mono); }
.sr-snippet a { color: var(--snippet-link); text-decoration: none; }
.sr-snippet a:hover { text-decoration: underline; }
.sr-empty {
  padding: 20px 14px; font-size: 12px; color: var(--text-faint); text-align: center;
}
.sr-featured {
  padding: 6px 14px 4px; font-size: 9px; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text-faint);
}
.sr-count {
  padding: 6px 14px; font-size: 10px; color: var(--text-ghost);
  border-top: 1px solid var(--border-faint); text-align: right;
}

#nav-list {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--surface4) transparent;
}
.nav-item {
  display: flex; align-items: center; width: 100%; height: calc(var(--sb-font) + 12px);
  padding: 0 16px 0 0;
  font-size: var(--sb-font); font-family: 'Geist Mono', 'JetBrains Mono', 'Fira Code', var(--mono);
  color: var(--text-muted); cursor: pointer;
  border: none; background: none; text-align: left;
  transition: color .12s, background .12s;
  white-space: nowrap; overflow: hidden;
}
.nav-item.nav-root { color: var(--text-dim); font-size: calc(var(--sb-font) + 1px); height: calc(var(--sb-font) + 16px); padding-left: 16px; margin-top: 2px; }
.nav-pre { display: flex; align-self: stretch; align-items: stretch; flex-shrink: 0; padding-left: 16px; }
.nav-slot { width: 12px; position: relative; flex-shrink: 0; }
.nav-slot-line::before {
  content: ''; position: absolute;
  left: 6px; top: 0; bottom: 0; width: 1px; background: var(--border-subtle);
}
.nav-conn { width: 18px; position: relative; flex-shrink: 0; }
.nav-conn::before {
  content: ''; position: absolute;
  left: 6px; top: 0; width: 1px; background: var(--border);
}
.nav-conn:not(.nav-conn-last)::before { bottom: 0; }
.nav-conn-last::before { bottom: 50%; }
.nav-conn::after {
  content: ''; position: absolute;
  left: 6px; right: 0; top: 50%; height: 1px;
  transform: translateY(-50%); background: var(--border);
}
.nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item:hover .nav-slot-line::before,
.nav-item:hover .nav-conn::before,
.nav-item:hover .nav-conn::after { background: var(--text-faint); }
.nav-item.active { color: var(--text); background: var(--surface3); }
.nav-item.active .nav-slot-line::before,
.nav-item.active .nav-conn::before,
.nav-item.active .nav-conn::after { background: var(--text-faint); }

/* Floating controls */
.float-controls {
  position: absolute; top: 12px; right: 12px;
  transition: right .22s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; gap: 3px;
  z-index: 100;
  background: var(--controls-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 6px;
  backdrop-filter: blur(8px);
}
.hbtn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-mid);
  height: 28px;
  min-width: 28px;
  padding: 0 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
  transition: all .15s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.hbtn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface3);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(129, 140, 248, 0.15);
}
.hbtn:active { transform: translateY(0); }
.hbtn.active {
  border-color: var(--accent);
  color: var(--bg);
  background: var(--accent);
  box-shadow: 0 2px 8px rgba(129, 140, 248, 0.3);
}
#zoom-label { font-size: 11px; color: var(--text-dim); width: 38px; text-align: center; font-family: var(--mono); }
.float-controls.sidebar-open { right: calc(var(--sidebar-w) + 12px); }
@media (max-width: 768px) { .float-controls.sidebar-open { right: 12px; } }

#canvas-wrap {
  flex: 1; position: relative; overflow: hidden; cursor: grab; margin-left: var(--nav-w);
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
  background-size: 28px 28px;
  user-select: none;
}
#canvas-wrap.panning { cursor: grabbing; }
#canvas { position: absolute; transform-origin: 0 0; }
#canvas svg { display: block; overflow: visible; }

/* SVG interactive elements */
.grp-node { cursor: pointer; }
.grp-node .grp-border { transition: stroke .12s, filter .12s; }
.grp-node:hover > .grp-border { stroke: var(--text) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
.grp-node.selected > .grp-border { stroke: var(--accent) !important; stroke-width: 2.5px; stroke-dasharray: none !important; filter: drop-shadow(0 0 8px var(--accent-glow)); }
.reg-node { cursor: pointer; }
.reg-node .nshape { transition: stroke .12s, filter .12s; }
.reg-node:hover .nshape { stroke: var(--text) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
/* Edge highlight on node hover */
.edge-path.edge-hl { stroke: var(--text) !important; stroke-width: 2.5px; opacity: 1; transition: all .15s; }
.edge-label-dim { transition: opacity .15s; pointer-events: all; }
.edge-label-dim:hover { opacity: 1 !important; }
.reg-node.selected .nshape { stroke: var(--accent) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 8px var(--accent-glow)); }
/* Overview mode */
.grp-inner { transition: opacity .25s; }
.grp-node.grp-collapsed > .grp-inner { opacity: 0.15; pointer-events: none; transition: opacity .25s; }
.grp-node.grp-collapsed > .grp-label-top { opacity: 0; transition: opacity .25s; }
.grp-node.grp-collapsed > .grp-label-bg { opacity: 0; transition: opacity .25s; }
.grp-node.grp-collapsed.focus-exempt > .grp-inner { opacity: 1 !important; pointer-events: auto !important; }
.grp-node.grp-collapsed.focus-exempt > .grp-label-top { opacity: 1 !important; }
.grp-node.grp-collapsed.focus-exempt > .grp-label-bg { opacity: 1 !important; }
.grp-node.grp-collapsed.focus-exempt > .grp-label-center { display: none !important; }
#canvas-wrap.zoom-overview .grp-inner { pointer-events: none; }
#canvas-wrap.zoom-overview .grp-inner > .reg-node { opacity: 0.2; transition: opacity .25s; }
#canvas-wrap.zoom-overview .grp-inner .edge-path { opacity: 0.4; transition: opacity .25s; }
#canvas-wrap.zoom-overview .grp-inner .edge-label { opacity: 0; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-inner { opacity: 0.06; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-border { opacity: 0.60; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-label-top { opacity: 0; }
.grp-label-center { display: none; }
#canvas-wrap.zoom-overview .grp-label-top { display: none; }
#canvas-wrap.zoom-overview .grp-label-center { display: block; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-label-center { display: none; }
.grp-sub-labels { display: none; pointer-events: none; }
.grp-sub-labels text { opacity: 0.45; }
.grp-node.grp-expanded > .grp-label-center { display: none; }
.grp-node.grp-collapsed:not(.grp-expanded) > .grp-label-center { display: block; opacity: 0.85; }
[data-cls].grp-expanded > .grp-label-center { display: none; }
#canvas-wrap.zoom-overview .grp-sub-labels { display: block; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner { pointer-events: auto !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner > .reg-node { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .edge-path { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .edge-label { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .grp-node .grp-inner { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .grp-node .grp-border { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .grp-node .grp-label-top { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt .grp-label-top { display: block !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt .grp-label-center { display: none !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-sub-labels { display: none !important; }

/* Sidebar */
#sidebar {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: var(--sidebar-w); min-width: 280px; max-width: 700px;
  background: var(--surface); border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform .22s cubic-bezier(.4,0,.2,1), width .18s ease;
  z-index: 300; display: flex; flex-direction: column;
}
#sidebar.open { transform: translateX(0); }
#sb-resize {
  position: absolute; top: 0; left: -3px; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 310;
  background: transparent;
  transition: background .15s;
}
#sb-resize:hover, #sb-resize.dragging { background: var(--accent-soft); }
#sb-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#sb-title { flex: 1; font-size: calc(var(--sb-font) + 2px); font-weight: 600; color: var(--text); font-family: var(--mono); }
#sb-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 22px; line-height: 1; padding: 0; }
#sb-close:hover { color: var(--text-mid); }
#sb-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--surface4) transparent; }

.sb-diagram { padding: 0; border-bottom: 1px solid var(--border); background: var(--bg-subtle); }
.sb-diagram svg { display: block; width: 100%; height: auto; overflow: visible; }
.sb-diagram-view { padding: 8px; max-height: 220px; overflow: hidden; scrollbar-width: thin; scrollbar-color: var(--border-subtle) transparent; }
.sb-diagram-view svg { max-height: 200px; width: 100%; height: auto; display: block; margin: 0 auto; object-fit: contain; }
.sb-diagram-view:hover { overflow: auto; }
.sb-diagram-toggle { display: flex; border-bottom: 1px solid var(--border-muted); align-items: center; }
.sb-diagram-tab { background: none; border: none; color: var(--text-muted); padding: 8px 16px; font-size: 11px; font-family: var(--mono); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.sb-format-badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; font-weight: 600; }
.sb-format-badge.mermaid { background: rgba(99, 102, 241, 0.15); color: #4f46e5; }
.sb-format-badge.plantuml { background: rgba(16, 185, 129, 0.15); color: #059669; }
html.light .sb-format-badge.mermaid { background: rgba(99, 102, 241, 0.1); color: #4338ca; }
html.light .sb-format-badge.plantuml { background: rgba(16, 185, 129, 0.1); color: #047857; }
.sb-diagram-tab:hover { color: var(--text-mid); }
.sb-diagram-tab.active { color: var(--text-body); border-bottom-color: var(--accent); }
.sb-diagram-actions { margin-left: auto; display: flex; align-items: center; }
.sb-diagram-expand { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px 8px; font-size: 14px; transition: all .15s; border-left: 1px solid var(--border-muted); }
.sb-diagram-expand:hover { color: var(--text); background: var(--surface3); }

/* Fullscreen diagram overlay */
#diagram-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 9999; flex-direction: column; }
#diagram-overlay.show { display: flex; }
#diagram-overlay-header { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
#diagram-overlay-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
#diagram-overlay-controls { display: flex; align-items: center; gap: 8px; }
#diagram-overlay-controls button { background: var(--surface2); border: 1px solid var(--border); color: var(--text-body); padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; transition: all .15s; }
#diagram-overlay-controls button:hover { background: var(--surface3); border-color: var(--accent); color: var(--text); }
#diagram-overlay-zoom { font-size: 12px; color: var(--text-muted); font-family: var(--mono); min-width: 48px; text-align: center; }
#diagram-overlay-close { background: none !important; border: none !important; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; }
#diagram-overlay-close:hover { color: var(--error); }
#diagram-overlay-body { flex: 1; overflow: hidden; position: relative; cursor: grab; }
#diagram-overlay-body.grabbing { cursor: grabbing; }
#diagram-overlay-body svg { position: absolute; transform-origin: 0 0; }
/* Flow animation for overlay */
#diagram-overlay-body svg.flowing .edge-path { stroke-width: 1px; stroke-opacity: 0.2; transition: all .3s; }
#diagram-overlay-body svg.flowing .edge-label { opacity: 0.2; transition: opacity .2s; }
#diagram-overlay-body svg.flowing .reg-node .nshape { fill-opacity: 0.15; stroke-opacity: 0.15; transition: all .3s; }
#diagram-overlay-body svg.flowing .grp-node > .grp-border { fill-opacity: 0.15; stroke-opacity: 0.15; transition: all .3s; }
#diagram-overlay-body svg.flowing .edge-path.flow-lit { stroke: var(--accent) !important; stroke-width: 3px; stroke-opacity: 1; stroke-dasharray: 6 3; animation: flow-march 0.8s linear infinite; }
#diagram-overlay-body svg.flowing .edge-label.flow-lit { opacity: 1 !important; }
#diagram-overlay-body svg.flowing .reg-node.flow-lit .nshape { fill-opacity: 1 !important; stroke-opacity: 1 !important; stroke: var(--accent) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px var(--accent-glow)); }
#diagram-overlay-body svg.flowing .grp-node.flow-lit > .grp-border { fill-opacity: 1 !important; stroke-opacity: 1 !important; stroke: var(--accent) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px var(--accent-glow)); }
.overlay-flow-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.sb-code-view { padding: 0; max-height: 300px; overflow: auto; scrollbar-width: thin; scrollbar-color: var(--surface4) transparent; }
.sb-rich-view { padding: 0; max-height: 400px; overflow: auto; scrollbar-width: thin; scrollbar-color: var(--surface4) transparent; }
.sb-rich-canvas { padding: 0; }
.sb-rich-canvas svg { display: block; width: 100%; height: auto; overflow: visible; }
.sb-rich-canvas .flow-bar { display: flex; padding: 6px 10px; gap: 4px; border-bottom: 1px solid var(--border-muted); flex-wrap: wrap; }
.sb-rich-canvas .flow-chip { font-size: 10px; padding: 3px 8px; }
/* Rich view flow animation */
.sb-rich-canvas svg.flowing .edge { stroke-opacity: 0.2; stroke-width: 1px; transition: all .2s; }
.sb-rich-canvas svg.flowing .elbl { opacity: 0.2; transition: opacity .2s; }
.sb-rich-canvas svg.flowing .node rect { fill-opacity: 0.15; stroke-opacity: 0.3; transition: all .2s; }
.sb-rich-canvas svg.flowing .edge.flow-lit { stroke: var(--accent) !important; stroke-width: 2.5px; stroke-opacity: 1 !important; stroke-dasharray: 6 4; animation: flow-march 0.8s linear infinite; }
.sb-rich-canvas svg.flowing .elbl.flow-lit { opacity: 1 !important; }
.sb-rich-canvas svg.flowing .node.flow-lit rect { fill-opacity: 1 !important; stroke-opacity: 1 !important; stroke: var(--accent) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px var(--accent-glow)); }
.sb-code-pre { margin: 0; padding: 12px 16px; font-family: var(--mono); font-size: 11px; line-height: 1.6; color: var(--text-mid); white-space: pre; }
.sb-timeline { padding: 8px 16px 12px; border-top: 1px solid var(--border-muted); }
.sb-timeline-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-family: var(--mono); }
.sb-timeline-slider { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
.sb-timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
.sb-timeline-slider::-moz-range-thumb { width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; border: none; }
.sb-timeline-info { font-size: 10px; color: var(--text-faint); margin-top: 4px; font-family: var(--mono); }
.sb-validate-ok { padding: 6px 0; font-size: 11px; color: var(--success); font-family: var(--mono); }
.sb-validate-section { padding: 4px 0; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; }
.sb-validate-errors { color: var(--error); }
.sb-validate-warnings { color: var(--warning); }
.sb-validate-issue { padding: 3px 0; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
.sb-validate-error { color: var(--error-text); }
.sb-validate-warning { color: var(--warning-text); }
.sb-validate-rule { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-right: 4px; }
.mk-keyword { color: var(--syn-keyword); font-weight: 600; }
.mk-direction { color: var(--syn-direction); }
.mk-arrow { color: var(--syn-arrow); }
.mk-node { color: var(--syn-node); }
.mk-label { color: var(--syn-label); }
.mk-class { color: var(--syn-class); }
.mk-comment { color: var(--syn-comment); font-style: italic; }
.mk-ref { color: var(--syn-ref); font-weight: 600; }
.sb-fields { padding: 16px 20px; }
.sb-sec { margin-bottom: 20px; }
.sb-sec-title { font-size: calc(var(--sb-font) - 2px); text-transform: uppercase; letter-spacing: .14em; color: var(--sec-title); padding-bottom: 7px; border-bottom: 1px solid var(--sec-border); margin-bottom: 9px; font-weight: 600; }
.sb-sec-body { font-size: var(--sb-font); line-height: 1.72; color: var(--body-text); }
.sb-sec-body p { margin-bottom: 6px; }
.sb-sec-body ul, .sb-sec-body ol { padding-left: 16px; }
.sb-sec-body li { margin-bottom: 3px; }
.sb-sec-body code { background: var(--code-bg); padding: 1px 5px; border-radius: 2px; font-size: calc(var(--sb-font) - 1px); color: var(--code-text); font-family: var(--mono); }
.sb-sec-body strong { color: var(--text-secondary); }
.sb-concern .sb-sec-body { border-left: 2px solid var(--concern-border); padding-left: 10px; }
.sb-meta-text { font-size: calc(var(--sb-font) - 1px); color: var(--meta-text); line-height: 1.9; font-family: var(--mono); }
.sb-metrics { display: flex; flex-wrap: wrap; gap: 8px 16px; }
.sb-metric { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.sb-metric-value { color: var(--text-body); font-weight: 600; }
.sb-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.sb-tag { display: inline-block; padding: 3px 10px; background: var(--tag-bg); border: 1px solid var(--tag-border); border-radius: 12px; font-size: calc(var(--sb-font) - 1px); color: var(--tag-text); font-family: var(--mono); letter-spacing: 0.02em; }
.sb-refs { display: flex; flex-direction: column; gap: 4px; }
.sb-ref { font-size: calc(var(--sb-font) - 1px); color: var(--ref-text); padding: 5px 10px; background: var(--ref-bg); border: 1px solid var(--ref-border); border-radius: 4px; cursor: pointer; display: block; font-family: var(--mono); transition: border-color .12s, color .12s; }
.sb-ref:hover { border-color: var(--ref-hover-border); color: var(--ref-hover-text); }
.sb-diff-toggle { background: none; border: 1px solid var(--diff-border); color: var(--diff-text); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: calc(var(--sb-font) - 1px); font-family: var(--mono); transition: all .15s; width: 100%; }
.sb-diff-toggle:hover { border-color: var(--text-faint); color: var(--text-body); }
.sb-diff-toggle.active { border-color: var(--diff-active-border); color: var(--diff-active-text); }
.empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
.empty-state p { font-size: 12px; color: var(--empty-text); line-height: 1.9; }

/* Flow chips */
.flow-bar {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border-muted);
  flex-wrap: wrap;
  background: var(--surface);
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 150;
}
.flow-bar.has-flows { display: flex; }
.flow-bar-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-right: 4px;
}
.flow-chip {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s ease;
}
.flow-chip:hover {
  color: var(--text);
  border-color: var(--text-dim);
}
.flow-chip.active {
  background: var(--text);
  border-color: var(--text);
  color: var(--bg);
}

/* Flow animation: dim non-lit, highlight lit */
#canvas-wrap.flowing .edge-path { stroke-width: 1px; stroke-opacity: 0.2; transition: all .2s; }
#canvas-wrap.flowing .edge-label { opacity: 0.2; transition: opacity .2s; }
#canvas-wrap.flowing .reg-node .nshape { fill-opacity: 0.15; stroke-opacity: 0.3; transition: all .2s; }
#canvas-wrap.flowing .grp-node > .grp-border { fill-opacity: 0.15; stroke-opacity: 0.3; transition: all .2s; }
/* Lit edges */
#canvas-wrap.flowing .edge-path.flow-lit {
  stroke: var(--accent) !important;
  stroke-width: 3px;
  stroke-opacity: 1 !important;
  stroke-dasharray: 8 5;
  animation: flow-march 0.8s linear infinite;
}
/* Lit edge labels */
#canvas-wrap.flowing .edge-label.flow-lit { opacity: 1 !important; }
/* Lit nodes */
#canvas-wrap.flowing .reg-node.flow-lit .nshape {
  fill-opacity: 1 !important;
  stroke-opacity: 1 !important;
  stroke: var(--accent) !important;
  stroke-width: 3px;
  filter: drop-shadow(0 0 8px var(--accent-glow));
}
#canvas-wrap.flowing .grp-node.flow-lit > .grp-border {
  fill-opacity: 1 !important;
  stroke-opacity: 1 !important;
  stroke: var(--accent) !important;
  stroke-width: 3px;
  filter: drop-shadow(0 0 8px var(--accent-glow));
}
@keyframes flow-march {
  to { stroke-dashoffset: -12; }
}
@media (prefers-reduced-motion: reduce) {
  #canvas-wrap.flowing .edge-path.flow-lit { animation: none; }
}

/* D3 Network Graph */
#canvas-wrap.network-mode #canvas { pointer-events: none; }
.network-svg { cursor: grab; }
.network-svg:active { cursor: grabbing; }
.network-node { cursor: pointer; pointer-events: all; }
.network-node circle { transition: stroke .15s, filter .15s; }
.network-node:hover circle { stroke: var(--text) !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
.network-node text { pointer-events: none; font-family: 'Plus Jakarta Sans',Inter,system-ui; font-weight: 600; }
.network-edge { stroke-opacity: 0.7; pointer-events: none; }
.network-label { font-family: var(--mono); font-size: 9px; fill: var(--text-muted); pointer-events: none; }

#mobile-nav-btn { display: none; }
#mobile-overlay { display: none; }

/* Mobile responsive */
@media (max-width: 768px) {
  :root { --nav-w: 0px; --sb-font: 12px; }
  #nav-sidebar {
    transform: translateX(-100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1), width 0s;
    z-index: 500;
    width: 260px !important; min-width: 260px; max-width: 260px;
  }
  #nav-sidebar.mobile-open { transform: translateX(0); }
  #nav-resize { display: none; }
  #search-results { left: 0; width: 100vw; border-radius: 0; }
  #canvas-wrap { left: 0 !important; margin-left: 0 !important; }
  #mobile-nav-btn {
    display: flex; align-items: center; gap: 8px;
    position: fixed; top: 10px; left: 10px; z-index: 400;
    background: var(--mobile-btn-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    color: var(--text); font-size: 13px; font-family: var(--mono);
    cursor: pointer; backdrop-filter: blur(8px);
  }
  #mobile-nav-btn span { font-size: 16px; }
  #mobile-overlay {
    display: none; position: fixed; inset: 0; z-index: 450;
    background: var(--mobile-overlay-bg);
  }
  #mobile-overlay.show { display: block; }
  #sidebar {
    top: auto; right: 0; bottom: 0; left: 0;
    width: 100%; height: 50vh;
    max-height: 70vh;
    border-left: none; border-top: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    transform: translateY(100%);
  }
  #sidebar.open { transform: translateY(0); }
  #sb-head {
    position: relative;
    padding: 12px 20px 10px;
  }
  #sb-head::before {
    content: '';
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 4px;
    background: var(--sb-head-handle); border-radius: 2px;
  }
  .float-controls { display: none; }
}

/* ── Custom Scrollbar Styles ──────────────────────────── */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--border-subtle) transparent;
}
*::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
*::-webkit-scrollbar-track {
  background: transparent;
}
*::-webkit-scrollbar-thumb {
  background: var(--border-subtle);
  border-radius: 3px;
}
*::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}
*::-webkit-scrollbar-corner {
  background: transparent;
}

/* PlantUML diagram containers */
.plantuml-container {
  overflow: hidden;
}
.plantuml-container:hover {
  overflow: auto;
}
.plantuml-container svg {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  display: block;
}
</style>
</head>
<body>
<div id="nav-sidebar">
  <div id="nav-resize"></div>
  <div id="nav-title-bar">
    <div id="nav-title">omm</div>
  </div>
  <div id="lang-stats" class="lang-stats"></div>
  <div id="search-box">
    <span id="search-icon">⌕</span>
    <input id="search-input" type="text" placeholder="Search elements…" autocomplete="off" />
  </div>
  <div id="nav-list"></div>
</div>
<div id="search-results"></div>

<div id="mobile-nav-btn" onclick="toggleMobileNav()"><span>☰</span><span id="mobile-title">omm</span></div>
<div id="mobile-overlay" onclick="toggleMobileNav()"></div>
<div id="diagram-overlay">
  <div id="diagram-overlay-header">
    <span id="diagram-overlay-title">Diagram</span>
    <div id="diagram-overlay-controls">
      <button onclick="diagramOverlayZoom(0.25)" title="Zoom in">+</button>
      <span id="diagram-overlay-zoom">100%</span>
      <button onclick="diagramOverlayZoom(-0.25)" title="Zoom out">−</button>
      <button onclick="diagramOverlayFit()" title="Fit to window">Fit</button>
      <button onclick="diagramOverlayReset()" title="Reset zoom">Reset</button>
    </div>
    <button id="diagram-overlay-close" onclick="closeDiagramOverlay()" title="Close (Esc)">✕</button>
  </div>
  <div id="diagram-overlay-body"></div>
</div>
<div id="canvas-wrap">
  <div class="float-controls">
    <button class="hbtn" onclick="zoomOut()" title="Zoom out">−</button>
    <span id="zoom-label">70%</span>
    <button class="hbtn" onclick="zoomIn()" title="Zoom in">+</button>
    <button class="hbtn" onclick="resetView()" title="Fit to view" style="font-size:11px">fit</button>
    <button class="hbtn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark/light theme" style="font-size:13px">○</button>
    <button class="hbtn" id="export-btn" onclick="exportDiagram()" title="Export diagram" style="font-size:12px">↓</button>
    <button class="hbtn" id="graph-btn" onclick="toggleGraphView()" title="Relationship graph" style="font-size:11px">◈</button>
    <button class="hbtn" id="network-btn" onclick="toggleNetworkView()" title="Network graph (D3 force-directed)" style="font-size:13px">⬡</button>
    <button class="hbtn" id="home-btn" onclick="window.location='/'" title="Back to projects" style="font-size:13px;display:none">⌂</button>
  </div>
  <div id="canvas"></div>
  <div class="flow-bar" id="flow-bar">
    <span class="flow-bar-label">Flows</span>
  </div>
</div>

<div id="sidebar">
  <div id="sb-resize"></div>
  <div id="sb-head"><div id="sb-title"></div><button id="sb-close" onclick="closeSidebar()">×</button></div>
  <div id="sb-body">
    <div class="sb-diagram" id="sb-diagram"></div>
    <div class="sb-fields" id="sb-fields"></div>
  </div>
</div>

<script type="module" src="./viewer-app.js"></script>
</body>
</html>
