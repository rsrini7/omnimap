<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oh-my-mermaid</title>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #000000;
  --border: #333333;
  --border-hi: #333;
  --text: #ffffff;
  --text-mid: #888;
  --text-dim: #555;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Fira Code', monospace;
  --sidebar-w: 400px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* Nav sidebar */
:root { --nav-w: 200px; --sb-font: clamp(12px, 1vw, 16px); }
#nav-sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--nav-w); min-width: 140px; max-width: 420px;
  background: #000; border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 200;
  transition: width .18s ease, border-color .18s;
}
/* Drag resize handle */
#nav-resize {
  position: absolute; top: 0; right: -3px; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 210;
  background: transparent;
  transition: background .15s;
}
#nav-resize:hover, #nav-resize.dragging { background: rgba(129,140,248,0.3); }

#nav-title-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 10px 10px 14px;
  flex-shrink: 0;
}
#nav-title {
  flex: 1; font-size: 13px; font-weight: 600; color: #fff;
  font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* Search */
#search-box {
  position: relative;
  padding: 0 10px 10px;
  flex-shrink: 0;
}
#search-input {
  width: 100%; height: calc(var(--sb-font) + 16px);
  background: #0d0d0d; border: 1px solid #222; border-radius: 5px;
  color: #ccc; font-size: var(--sb-font); font-family: var(--font);
  padding: 0 8px 0 28px;
  outline: none; transition: border-color .15s;
}
#search-input:focus { border-color: #555; }
#search-input::placeholder { color: #444; }
#search-icon {
  position: absolute; left: 18px; top: 8px;
  color: #444; font-size: 13px; pointer-events: none;
}
/* Results dropdown: fixed position so it extends wider than the sidebar */
#search-results {
  position: fixed; top: 52px; left: var(--nav-w);
  width: 420px; max-height: 400px;
  background: #0a0a0a; border: 1px solid #222; border-radius: 8px;
  overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #1a1a1a transparent;
  display: none; z-index: 350;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
}
#search-results.open { display: block; }
.sr-item {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid #151515;
  transition: background .1s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover, .sr-item.active { background: #161616; }
.sr-item-header { display: flex; align-items: center; gap: 8px; }
.sr-path {
  font-size: 12px; font-family: var(--mono); color: #aaa;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.sr-field {
  display: inline-block; font-size: 9px; text-transform: uppercase;
  letter-spacing: .1em; color: #666; background: #141414;
  padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
}
.sr-snippet {
  font-size: 12px; color: #999; line-height: 1.6;
  word-break: break-word;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.sr-snippet mark {
  background: rgba(129,140,248,0.15); color: #c7d2fe;
  border-radius: 2px; padding: 0 2px; font-weight: 600;
}
.sr-snippet strong { color: #e2e8f0; font-weight: 600; }
.sr-snippet em { color: #a5b4fc; font-style: italic; }
.sr-snippet code { background: #1e1e2e; color: #c4b5fd; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; font-family: var(--mono); }
.sr-snippet a { color: #93c5fd; text-decoration: none; }
.sr-snippet a:hover { text-decoration: underline; }
.sr-empty {
  padding: 20px 14px; font-size: 12px; color: #555; text-align: center;
}
.sr-featured {
  padding: 6px 14px 4px; font-size: 9px; text-transform: uppercase;
  letter-spacing: .1em; color: #555;
}
.sr-count {
  padding: 6px 14px; font-size: 10px; color: #444;
  border-top: 1px solid #151515; text-align: right;
}

#nav-list {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #1a1a1a transparent;
}
.nav-item {
  display: flex; align-items: center; width: 100%; height: calc(var(--sb-font) + 12px);
  padding: 0 16px 0 0;
  font-size: var(--sb-font); font-family: 'Geist Mono', 'JetBrains Mono', 'Fira Code', var(--mono);
  color: #666; cursor: pointer;
  border: none; background: none; text-align: left;
  transition: color .12s, background .12s;
  white-space: nowrap; overflow: hidden;
}
.nav-item.nav-root { color: #bbb; font-size: calc(var(--sb-font) + 1px); height: calc(var(--sb-font) + 16px); padding-left: 16px; margin-top: 2px; }
.nav-pre { display: flex; align-self: stretch; align-items: stretch; flex-shrink: 0; padding-left: 16px; }
.nav-slot { width: 12px; position: relative; flex-shrink: 0; }
.nav-slot-line::before {
  content: ''; position: absolute;
  left: 6px; top: 0; bottom: 0; width: 1px; background: #222;
}
.nav-conn { width: 18px; position: relative; flex-shrink: 0; }
.nav-conn::before {
  content: ''; position: absolute;
  left: 6px; top: 0; width: 1px; background: #2e2e2e;
}
.nav-conn:not(.nav-conn-last)::before { bottom: 0; }
.nav-conn-last::before { bottom: 50%; }
.nav-conn::after {
  content: ''; position: absolute;
  left: 6px; right: 0; top: 50%; height: 1px;
  transform: translateY(-50%); background: #2e2e2e;
}
.nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.nav-item:hover { color: #fff; background: #0d0d0d; }
.nav-item:hover .nav-slot-line::before,
.nav-item:hover .nav-conn::before,
.nav-item:hover .nav-conn::after { background: #555; }
.nav-item.active { color: #fff; background: #141414; }
.nav-item.active .nav-slot-line::before,
.nav-item.active .nav-conn::before,
.nav-item.active .nav-conn::after { background: #555; }

/* Floating controls */
.float-controls {
  position: absolute; top: 12px; right: 12px;
  transition: right .22s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; gap: 3px;
  z-index: 100;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 6px;
  backdrop-filter: blur(8px);
}
.hbtn { background: none; border: 1px solid var(--border-hi); color: var(--text-mid); height: 26px; min-width: 26px; padding: 0 8px; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: var(--font); transition: border-color .12s, color .12s; }
.hbtn:hover { border-color: #3a3a3a; color: var(--text); }
.hbtn.active { border-color: #818cf8; color: #818cf8; }
#zoom-label { font-size: 11px; color: var(--text-dim); width: 38px; text-align: center; font-family: var(--mono); }
.float-controls.sidebar-open { right: calc(var(--sidebar-w) + 12px); }
@media (max-width: 768px) { .float-controls.sidebar-open { right: 12px; } }

#canvas-wrap {
  flex: 1; position: relative; overflow: hidden; cursor: grab; margin-left: var(--nav-w);
  background-color: var(--bg);
  background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
  background-size: 28px 28px;
  user-select: none;
}
#canvas-wrap.panning { cursor: grabbing; }
#canvas { position: absolute; transform-origin: 0 0; }
#canvas svg { display: block; overflow: visible; }

/* SVG interactive elements */
.grp-node { cursor: pointer; }
.grp-node .grp-border { transition: stroke .12s, filter .12s; }
.grp-node:hover > .grp-border { stroke: #ffffff !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
.grp-node.selected > .grp-border { stroke: #818cf8 !important; stroke-width: 2.5px; stroke-dasharray: none !important; filter: drop-shadow(0 0 8px rgba(129,140,248,0.6)); }
.reg-node { cursor: pointer; }
.reg-node .nshape { transition: stroke .12s, filter .12s; }
.reg-node:hover .nshape { stroke: #ffffff !important; stroke-width: 2.5px; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
/* Edge highlight on node hover */
.edge-path.edge-hl { stroke: #ffffff !important; stroke-width: 2.5px; opacity: 1; transition: all .15s; }
.edge-label-dim { transition: opacity .15s; pointer-events: all; }
.edge-label-dim:hover { opacity: 1 !important; }
.reg-node.selected .nshape { stroke: #818cf8 !important; stroke-width: 2.5px; filter: drop-shadow(0 0 8px rgba(129,140,248,0.6)); }
/* Overview mode: per-element fade — borders + edges stay visible */
.grp-inner { transition: opacity .25s; }
/* Collapsed groups: dim inner content, show center label */
.grp-node.grp-collapsed > .grp-inner { opacity: 0.15; pointer-events: none; transition: opacity .25s; }
.grp-node.grp-collapsed > .grp-label-top { opacity: 0; transition: opacity .25s; }
.grp-node.grp-collapsed > .grp-label-bg { opacity: 0; transition: opacity .25s; }
/* Focus-exempt override for collapsed groups */
.grp-node.grp-collapsed.focus-exempt > .grp-inner { opacity: 1 !important; pointer-events: auto !important; }
.grp-node.grp-collapsed.focus-exempt > .grp-label-top { opacity: 1 !important; }
.grp-node.grp-collapsed.focus-exempt > .grp-label-bg { opacity: 1 !important; }
.grp-node.grp-collapsed.focus-exempt > .grp-label-center { display: none !important; }
#canvas-wrap.zoom-overview .grp-inner { pointer-events: none; }
#canvas-wrap.zoom-overview .grp-inner > .reg-node { opacity: 0.2; transition: opacity .25s; }
#canvas-wrap.zoom-overview .grp-inner .edge-path { opacity: 0.4; transition: opacity .25s; }
#canvas-wrap.zoom-overview .grp-inner .edge-label { opacity: 0; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-inner { opacity: 0.06; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-border { opacity: 0.60; }
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-label-top { opacity: 0; }
/* Top-level group labels */
.grp-label-center { display: none; }
#canvas-wrap.zoom-overview .grp-label-top { display: none; }
#canvas-wrap.zoom-overview .grp-label-center { display: block; }
/* Hide sub-group direct center labels in zoom-overview (labelOverlay handles these) */
#canvas-wrap.zoom-overview .grp-inner > .grp-node > .grp-label-center { display: none; }
/* Sub-group overlay labels (outside grp-inner — unaffected by opacity) */
.grp-sub-labels { display: none; pointer-events: none; }
.grp-sub-labels text { opacity: 0.45; }
/* Depth-aware labels: expanded groups hide center, show top-left */
.grp-node.grp-expanded > .grp-label-center { display: none; }
/* Center label only visible when collapsed (not merely non-expanded) */
.grp-node.grp-collapsed:not(.grp-expanded) > .grp-label-center { display: block; opacity: 0.85; }
/* Top-level expanded: hide center */
[data-cls].grp-expanded > .grp-label-center { display: none; }
#canvas-wrap.zoom-overview .grp-sub-labels { display: block; }
/* Focused group: restore full visibility */
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner { pointer-events: auto !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner > .reg-node { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .edge-path { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .edge-label { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .grp-node .grp-inner { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .grp-node .grp-border { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-inner .grp-node .grp-label-top { opacity: 1 !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt .grp-label-top { display: block !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt .grp-label-center { display: none !important; }
#canvas-wrap.zoom-overview [data-cls].focus-exempt > .grp-sub-labels { display: none !important; }

/* Sidebar */
#sidebar {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: var(--sidebar-w); min-width: 280px; max-width: 700px;
  background: #000; border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform .22s cubic-bezier(.4,0,.2,1), width .18s ease;
  z-index: 300; display: flex; flex-direction: column;
}
#sidebar.open { transform: translateX(0); }
#sb-resize {
  position: absolute; top: 0; left: -3px; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 310;
  background: transparent;
  transition: background .15s;
}
#sb-resize:hover, #sb-resize.dragging { background: rgba(129,140,248,0.3); }
#sb-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#sb-title { flex: 1; font-size: calc(var(--sb-font) + 2px); font-weight: 600; color: #fff; font-family: var(--mono); }
#sb-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 22px; line-height: 1; padding: 0; }
#sb-close:hover { color: #888; }
#sb-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1a1a1a transparent; }

.sb-diagram { padding: 0; border-bottom: 1px solid var(--border); background: #030303; }
.sb-diagram svg { display: block; width: 100%; height: auto; overflow: visible; }
.sb-diagram-view { padding: 16px; }
.sb-diagram-toggle { display: flex; border-bottom: 1px solid #1a1a1a; }
.sb-diagram-tab { background: none; border: none; color: #666; padding: 8px 16px; font-size: 11px; font-family: var(--mono); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.sb-diagram-tab:hover { color: #aaa; }
.sb-diagram-tab.active { color: #ccc; border-bottom-color: #818cf8; }
.sb-code-view { padding: 0; max-height: 300px; overflow: auto; scrollbar-width: thin; scrollbar-color: #1a1a1a transparent; }
.sb-code-pre { margin: 0; padding: 12px 16px; font-family: var(--mono); font-size: 11px; line-height: 1.6; color: #aaa; white-space: pre; }
.sb-timeline { padding: 8px 16px 12px; border-top: 1px solid #1a1a1a; }
.sb-timeline-label { font-size: 10px; color: #666; margin-bottom: 6px; font-family: var(--mono); }
.sb-timeline-slider { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: #333; border-radius: 2px; outline: none; cursor: pointer; }
.sb-timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #818cf8; border-radius: 50%; cursor: pointer; }
.sb-timeline-slider::-moz-range-thumb { width: 14px; height: 14px; background: #818cf8; border-radius: 50%; cursor: pointer; border: none; }
.sb-timeline-info { font-size: 10px; color: #555; margin-top: 4px; font-family: var(--mono); }
.sb-validate-ok { padding: 6px 0; font-size: 11px; color: #22c55e; font-family: var(--mono); }
.sb-validate-section { padding: 4px 0; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; }
.sb-validate-errors { color: #ef4444; }
.sb-validate-warnings { color: #fbbf24; }
.sb-validate-issue { padding: 3px 0; font-size: 11px; color: #999; line-height: 1.5; }
.sb-validate-error { color: #fca5a5; }
.sb-validate-warning { color: #fde68a; }
.sb-validate-rule { font-family: var(--mono); font-size: 10px; color: #666; margin-right: 4px; }
.mk-keyword { color: #c084fc; font-weight: 600; }
.mk-direction { color: #67e8f9; }
.mk-arrow { color: #fbbf24; }
.mk-node { color: #818cf8; }
.mk-label { color: #a3e635; }
.mk-class { color: #fb923c; }
.mk-comment { color: #555; font-style: italic; }
.mk-ref { color: #f472b6; font-weight: 600; }
.sb-fields { padding: 16px 20px; }
.sb-sec { margin-bottom: 20px; }
.sb-sec-title { font-size: calc(var(--sb-font) - 2px); text-transform: uppercase; letter-spacing: .14em; color: #888; padding-bottom: 7px; border-bottom: 1px solid #1e1e1e; margin-bottom: 9px; font-weight: 600; }
.sb-sec-body { font-size: var(--sb-font); line-height: 1.72; color: #bbb; }
.sb-sec-body p { margin-bottom: 6px; }
.sb-sec-body ul, .sb-sec-body ol { padding-left: 16px; }
.sb-sec-body li { margin-bottom: 3px; }
.sb-sec-body code { background: #111; padding: 1px 5px; border-radius: 2px; font-size: calc(var(--sb-font) - 1px); color: #ccc; font-family: var(--mono); }
.sb-sec-body strong { color: #eee; }
.sb-concern .sb-sec-body { border-left: 2px solid #444; padding-left: 10px; }
.sb-meta-text { font-size: calc(var(--sb-font) - 1px); color: #777; line-height: 1.9; font-family: var(--mono); }
.sb-metrics { display: flex; flex-wrap: wrap; gap: 8px 16px; }
.sb-metric { font-size: 11px; color: #888; font-family: var(--mono); }
.sb-metric-value { color: #ccc; font-weight: 600; }
.sb-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.sb-tag { display: inline-block; padding: 3px 10px; background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; font-size: calc(var(--sb-font) - 1px); color: #818cf8; font-family: var(--mono); letter-spacing: 0.02em; }
.sb-refs { display: flex; flex-direction: column; gap: 4px; }
.sb-ref { font-size: calc(var(--sb-font) - 1px); color: #999; padding: 5px 10px; background: #090909; border: 1px solid #1e1e1e; border-radius: 4px; cursor: pointer; display: block; font-family: var(--mono); transition: border-color .12s, color .12s; }
.sb-ref:hover { border-color: #333; color: #bbb; }
.sb-diff-toggle { background: none; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: calc(var(--sb-font) - 1px); font-family: var(--mono); transition: all .15s; width: 100%; }
.sb-diff-toggle:hover { border-color: #555; color: #ccc; }
.sb-diff-toggle.active { border-color: #22c55e; color: #22c55e; }
.empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
.empty-state p { font-size: 12px; color: #444; line-height: 1.9; }
/* Light mode */
body.light { --bg: #f0f0f0; --border: #ddd; --border-hi: #bbb; --text: #1a1a1a; --text-mid: #555; --text-dim: #aaa; }
body.light header { background: #fff; }
body.light #canvas-wrap { background-color: #f0f0f0; background-image: radial-gradient(circle, #ccc 1px, transparent 1px); }
body.light #sidebar { background: #fafafa; }
body.light #sb-title { color: #333; }
body.light #sb-close { color: #999; }
body.light #sb-close:hover { color: #333; }
body.light #sb-resize:hover, body.light #sb-resize.dragging { background: rgba(79,70,229,0.2); }
body.light #sb-body { scrollbar-color: #ddd transparent; }
body.light .hbtn { border-color: #ccc; color: #666; }
body.light .hbtn:hover { border-color: #aaa; color: #222; }
body.light .sb-diagram { background: #f5f5f5; }
body.light .sb-diagram-toggle { border-bottom-color: #ddd; }
body.light .sb-diagram-tab { color: #999; }
body.light .sb-diagram-tab:hover { color: #333; }
body.light .sb-diagram-tab.active { color: #333; border-bottom-color: #4f46e5; }
body.light .sb-timeline { border-top-color: #ddd; }
body.light .sb-timeline-label { color: #999; }
body.light .sb-timeline-slider { background: #ddd; }
body.light .sb-timeline-slider::-webkit-slider-thumb { background: #4f46e5; }
body.light .sb-timeline-slider::-moz-range-thumb { background: #4f46e5; }
body.light .sb-timeline-info { color: #999; }
body.light .sb-validate-ok { color: #16a34a; }
body.light .sb-validate-errors { color: #dc2626; }
body.light .sb-validate-warnings { color: #d97706; }
body.light .sb-validate-issue { color: #555; }
body.light .sb-validate-error { color: #b91c1c; }
body.light .sb-validate-warning { color: #92400e; }
body.light .sb-validate-rule { color: #999; }
body.light .sb-code-pre { color: #555; }
body.light .mk-keyword { color: #7c3aed; }
body.light .mk-direction { color: #0891b2; }
body.light .mk-arrow { color: #d97706; }
body.light .mk-node { color: #4f46e5; }
body.light .mk-label { color: #65a30d; }
body.light .mk-class { color: #ea580c; }
body.light .mk-comment { color: #aaa; }
body.light .mk-ref { color: #db2777; }
body.light .sb-sec-title { color: #aaa; border-color: #ddd; }
body.light .sb-sec-body { color: #555; }
body.light .sb-sec-body code { background: #e5e5e5; color: #333; }
body.light .sb-sec-body strong { color: #222; }
body.light .sb-concern .sb-sec-body { border-color: #ccc; }
body.light .sb-meta-text { color: #999; }

#mobile-nav-btn { display: none; }

/* Mobile responsive */
@media (max-width: 768px) {
  :root { --nav-w: 0px; --sb-font: 12px; }
  #nav-sidebar {
    transform: translateX(-100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1), width 0s;
    z-index: 500;
    width: 260px !important; min-width: 260px; max-width: 260px;
  }
  #nav-sidebar.mobile-open { transform: translateX(0); }
  #nav-resize { display: none; }
  #search-results { left: 0; width: 100vw; border-radius: 0; }
  #canvas-wrap { left: 0 !important; margin-left: 0 !important; }
  #mobile-nav-btn {
    display: flex; align-items: center; gap: 8px;
    position: fixed; top: 10px; left: 10px; z-index: 400;
    background: rgba(0,0,0,0.75); border: 1px solid #333;
    border-radius: 6px; padding: 6px 12px;
    color: #fff; font-size: 13px; font-family: var(--mono);
    cursor: pointer; backdrop-filter: blur(8px);
  }
  #mobile-nav-btn span { font-size: 16px; }
  #mobile-overlay {
    display: none; position: fixed; inset: 0; z-index: 450;
    background: rgba(0,0,0,0.5);
  }
  #mobile-overlay.show { display: block; }
  #sidebar {
    top: auto; right: 0; bottom: 0; left: 0;
    width: 100%; height: 50vh;
    max-height: 70vh;
    border-left: none; border-top: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    transform: translateY(100%);
  }
  #sidebar.open { transform: translateY(0); }
  #sb-head {
    position: relative;
    padding: 12px 20px 10px;
  }
  #sb-head::before {
    content: '';
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 4px;
    background: #444; border-radius: 2px;
  }
  .float-controls { display: none; }
}
</style>
</head>
<body>
<div id="nav-sidebar">
  <div id="nav-resize"></div>
  <div id="nav-title-bar">
    <div id="nav-title">omm</div>
  </div>
  <div id="search-box">
    <span id="search-icon">⌕</span>
    <input id="search-input" type="text" placeholder="Search elements…" autocomplete="off" />
  </div>
  <div id="nav-list"></div>
</div>
<div id="search-results"></div>

<div id="mobile-nav-btn" onclick="toggleMobileNav()"><span>☰</span><span id="mobile-title">omm</span></div>
<div id="mobile-overlay" onclick="toggleMobileNav()"></div>
<div id="canvas-wrap">
  <div class="float-controls">
    <button class="hbtn" onclick="zoomOut()">−</button>
    <span id="zoom-label">70%</span>
    <button class="hbtn" onclick="zoomIn()">+</button>
    <button class="hbtn" onclick="resetView()" style="font-size:11px">fit</button>
    <button class="hbtn" id="theme-btn" onclick="toggleTheme()" style="font-size:13px">○</button>
    <button class="hbtn" id="export-btn" onclick="exportDiagram()" title="Export diagram" style="font-size:12px">↓</button>
    <button class="hbtn" id="graph-btn" onclick="toggleGraphView()" title="Relationship graph" style="font-size:11px">◈</button>
    <button class="hbtn" id="home-btn" onclick="window.location='/'" title="Back to projects" style="font-size:13px;display:none">⌂</button>
  </div>
  <div id="canvas"></div>
</div>

<div id="sidebar">
  <div id="sb-resize"></div>
  <div id="sb-head"><div id="sb-title"></div><button id="sb-close" onclick="closeSidebar()">×</button></div>
  <div id="sb-body">
    <div class="sb-diagram" id="sb-diagram"></div>
    <div class="sb-fields" id="sb-fields"></div>
  </div>
</div>

<script type="module" src="./viewer-app.js"></script>
